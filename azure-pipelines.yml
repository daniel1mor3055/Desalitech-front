# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- develop

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  displayName: 'Install Node.js'
  inputs:
    versionSpec: 'v12.18.1'
- script: |
    npm install
- script: |
    npm run build
- task: AzureCLI@2
  displayName: 'Upload static website to Azure account storage'
  inputs:
    azureSubscription: 'Desalitech Azure Subscription 1(69b96a18-d18a-4f3d-87f5-09f2064c6b03)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: "az storage blob upload-batch --account-name desalitech --account-key 7M5021cKg2hh4pxCHrvFmtQfav9pwRRfR3A3bVOYnUmR3IM7RGZJX8HBDl3ux7i6CLo8y3UCVQAL8Iu0O2m5NQ== --destination '$web' --source ."
